version: "3"

networks:
  iamcare-network:
    driver: bridge

services:

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - DB_PASSWORD=${MYSQL_PASSWORD}
    networks:
      - iamcare-network
    ports:
      - "9222:8000"
    volumes:
      - ./api/:/var/www/html/
      - ./api/logs/php.log:/var/log/fpm-php.www.log

  database:
    build: ./database
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-iamcare}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER:-iamcare}
    networks:
      - iamcare-network
    volumes:
      - ./database/data:/var/lib/mysql

  database-testing:
    build: ./database
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-iamcare}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER:-iamcare}
    networks:
      - iamcare-network
