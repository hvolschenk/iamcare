name: Client
on: pull_request

jobs:
  unit_tests:
    name: 'Unit tests'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install
        working-directory: ./client
      
      - name: Test static
        run: npm run test:static:ci
        working-directory: ./client
      
      - name: Test types/compilation
        run: npm run test:types
        working-directory: ./client
      
      - name: Unit tests
        run: npm run test:scripts
        working-directory: ./client
